name: hygiene
on:
  pull_request:
jobs:
  hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }}
      - name: Upstream hygiene (PR-range only)
        run: node scripts/ci/hygiene-check.mjs "origin/${{ github.base_ref }}"
