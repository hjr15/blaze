name: smoke
on:
  pull_request:
  push:
    branches: [main]
jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Package smoke (pack + install-from-tarball + boot)
        run: bash scripts/ci/smoke.sh
